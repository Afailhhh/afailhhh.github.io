<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    /* 临时兜底：直接在 HTML 里写样式，避免 Jekyll 编译延迟 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent !important;
    }
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100vw;
      min-height: 100vh;
      width: auto;
      height: auto;
      z-index: -10; /* 确保在最底层 */
      object-fit: cover;
      opacity: 0.85;
    }
    .content {
      position: relative;
      z-index: 10; /* 文字在视频上方 */
      color: white;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <!-- 视频背景 -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/assets/video/bg.mp4" type="video/mp4">
  </video>

  <!-- 博客内容 -->
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
