<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <style>
    /* 核心背景样式：一键搞定 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: url("/assets/img/bg.jpg") no-repeat center center fixed;
      background-size: cover; /* 铺满屏幕，保持比例 */
      color: white; /* 文字白色，适配背景 */
      text-shadow: 0 0 8px #000; /* 文字加阴影，更清晰 */
      min-height: 100vh; /* 避免背景高度不足 */
    }
    /* 博客内容容器：居中、不遮挡 */
    .content {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 20px;
    }
  </style>
</head>
<body>
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
